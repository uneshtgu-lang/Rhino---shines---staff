<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Rhino Shines Staff"/>
<title>Rhino Shines — Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0A0C0F;--surface:#111418;--panel:#181C22;--rim:#252A33;--muted:#3A4150;
  --dim:#6B7585;--soft:#9BA8BB;--text:#E8ECF4;
  --gold:#C9A84C;--gold2:#E8C96A;--goldDim:#C9A84C33;--goldRim:#C9A84C55;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;
  --display:"Playfair Display",Georgia,serif;--body:"Inter",system-ui,sans-serif;
  --r:14px;--r-sm:9px;--r-pill:999px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--ink);color:var(--text);font-family:var(--body);min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
button,label{cursor:pointer;font-family:var(--body);}
input,select,textarea{font-family:var(--body);color:var(--text);}
select option{background:var(--panel);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}

.hdr{background:var(--surface);border-bottom:1px solid var(--rim);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.hdr-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1a1200,#2d2000);border:1px solid var(--goldRim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hdr-brand{font-family:var(--display);font-size:18px;font-weight:700;color:var(--gold2);}
.hdr-sub{font-size:10px;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}
.tab-row{display:flex;gap:5px;margin-left:auto;}
.tbtn{padding:8px 12px;border-radius:var(--r-sm);border:none;font-weight:600;font-size:12px;letter-spacing:.3px;transition:all .15s;}
.tbtn.on{background:var(--gold);color:#0A0C0F;}
.tbtn.off{background:var(--panel);color:var(--dim);border:1px solid var(--rim);}
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}

.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}

.sum-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--rim);}
.sum-cell{flex:1;padding:13px 6px;text-align:center;position:relative;}
.sum-cell+.sum-cell::before{content:"";position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--rim);}
.sum-val{font-family:var(--display);font-size:20px;font-weight:700;}
.sum-lbl{font-size:9px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

.wrap{padding:16px;max-width:700px;margin:0 auto;}
.sec-eyebrow{font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-eyebrow::after{content:"";flex:1;height:1px;background:var(--rim);}

.bay-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.bay{border:1px solid var(--rim);border-radius:var(--r);padding:13px 6px;text-align:center;background:var(--panel);transition:border-color .2s;}
.bay.active{border-color:var(--goldRim);background:var(--surface);}
.bay-num{font-size:9px;color:var(--dim);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.bay-plate{font-family:var(--display);font-size:13px;font-weight:600;margin-top:4px;}
.bay-svc{font-size:10px;color:var(--dim);margin-top:2px;}
.bay-empty{font-size:18px;margin-top:6px;opacity:.4;}

.filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.fbtn{padding:6px 14px;border-radius:var(--r-pill);border:1px solid var(--rim);font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.fbtn.on{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.fbtn.off{background:transparent;color:var(--dim);}

.qcard{background:var(--panel);border-radius:var(--r);padding:14px 15px;margin-bottom:10px;border:1px solid var(--rim);border-left:3px solid var(--gold);position:relative;overflow:hidden;}
.qcard.new-booking{animation:slideIn .4s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.plate-tag{background:var(--ink);border:1px solid var(--muted);border-radius:6px;padding:5px 10px;font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:2px;flex-shrink:0;}
.card-name{font-weight:600;font-size:13px;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card-meta{font-size:11px;color:var(--dim);}
.pills{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.pill{border-radius:var(--r-pill);font-size:10px;padding:2px 8px;font-weight:600;border:1px solid;}
.act-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.abtn{flex:1;padding:9px;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:600;letter-spacing:.2px;transition:all .15s;}
.abtn.detail{background:var(--surface);color:var(--soft);border:1px solid var(--rim);}
.abtn.assign{background:linear-gradient(135deg,#1d3461,#2563EB);color:#fff;}
.abtn.done{background:linear-gradient(135deg,#064e3b,#059669);color:#fff;}
.abtn.del{flex:0;padding:9px 12px;background:var(--surface);color:var(--muted);border:1px solid var(--rim);border-radius:var(--r-sm);}
.bdg{border-radius:var(--r-pill);font-size:10px;font-weight:600;padding:3px 10px;white-space:nowrap;letter-spacing:.3px;}
.bdg-w{background:#78350f22;color:#FCD34D;border:1px solid #78350f88;}
.bdg-p{background:#1e3a8a22;color:#93C5FD;border:1px solid #1e3a8a88;}
.bdg-d{background:#14532d22;color:#86EFAC;border:1px solid #14532d88;}
.bdg-new{background:#C9A84C22;color:#C9A84C;border:1px solid #C9A84C88;animation:glow 1.5s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 4px #C9A84C44;}to{box-shadow:0 0 10px #C9A84C88;}}
.type-b{background:#1e1b4b;color:#a5b4fc;border-radius:var(--r-pill);font-size:9px;font-weight:700;padding:2px 8px;letter-spacing:.5px;text-transform:uppercase;border:1px solid #312e8166;}
.type-w{background:#1c0505;color:#fca5a5;border-radius:var(--r-pill);font-size:9px;font-weight:700;padding:2px 8px;letter-spacing:.5px;text-transform:uppercase;border:1px solid #45061066;}

.notif{background:linear-gradient(135deg,#1a1200,#2a1e00);border:1px solid var(--gold);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.notif-dismiss{background:transparent;border:1px solid var(--goldRim);color:var(--gold);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;flex-shrink:0;}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal-sheet{background:var(--surface);border:1px solid var(--rim);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:93vh;overflow-y:auto;padding:18px 16px 44px;}
.modal-handle{width:36px;height:3px;background:var(--muted);border-radius:2px;margin:0 auto 18px;}
.modal-sec{font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:9px;margin-top:4px;}
.field{margin-bottom:13px;}
.field label{font-size:10px;color:var(--dim);font-weight:600;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.field input,.field select,.field textarea{width:100%;background:var(--panel);border:1px solid var(--rim);border-radius:var(--r-sm);padding:11px 13px;font-size:14px;outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field textarea{resize:vertical;}

.media-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.media-lbl{border-radius:var(--r);padding:16px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--rim);}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.photo-wrap{position:relative;border-radius:var(--r-sm);overflow:hidden;}
.photo-wrap img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 50%);pointer-events:none;}
.photo-time{position:absolute;bottom:5px;left:6px;color:#fff;font-size:9px;}
.photo-del{position:absolute;top:5px;right:5px;background:rgba(239,68,68,.9);border:none;color:#fff;border-radius:5px;width:22px;height:22px;font-size:12px;font-weight:700;line-height:22px;padding:0;text-align:center;}
.vid-row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--rim);border-radius:var(--r-sm);padding:10px 13px;margin-bottom:8px;}
.vid-del{background:rgba(239,68,68,.15);border:1px solid #EF444444;color:#F87171;border-radius:6px;padding:5px 9px;font-size:11px;font-weight:600;}
.puspa-row{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--rim);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:7px;}
.puspa-lbl{flex:1;font-size:13px;font-weight:500;}
.pchk{padding:6px 9px;border:1px solid var(--rim);border-radius:6px;font-size:13px;font-weight:700;background:var(--surface);color:var(--dim);min-width:40px;}
.pchk.pass{background:#14532d33;border-color:#22c55e66;color:#22c55e;}
.pchk.fail{background:#450a0a33;border-color:#ef444466;color:#ef4444;}
.pchk.pend{background:#78350f22;border-color:#f59e0b44;color:#f59e0b;}
.score-pills{display:flex;gap:8px;margin-bottom:12px;padding:11px 13px;background:var(--panel);border:1px solid var(--rim);border-radius:var(--r-sm);flex-wrap:wrap;}
.spill{border-radius:var(--r-pill);padding:3px 10px;font-size:11px;font-weight:600;}
.prog-bar{height:4px;border-radius:2px;overflow:hidden;display:flex;margin-top:10px;background:var(--rim);}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:700;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img,.lb video{max-width:95vw;max-height:88vh;border-radius:var(--r);object-fit:contain;}
.lb-close{position:absolute;top:16px;right:16px;background:var(--surface);border:1px solid var(--rim);color:var(--soft);border-radius:8px;padding:8px 16px;font-weight:600;font-size:13px;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;color:#fff;padding:10px 20px;border-radius:var(--r-pill);font-weight:600;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.6);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;border:1px solid rgba(255,255,255,.1);}
.toast.show{opacity:1;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--panel);border:1px solid var(--rim);border-radius:var(--r);padding:16px 15px;}
.stat-val{font-family:var(--display);font-size:22px;font-weight:700;}
.stat-lbl{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}
.divider{height:1px;background:var(--rim);margin:16px 0;}
.gold-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold));background-size:200% 100%;color:var(--ink);border:none;border-radius:var(--r);font-weight:700;font-size:15px;letter-spacing:.3px;}
.ghost-btn{width:100%;padding:11px;background:transparent;color:var(--dim);border:1px solid var(--rim);border-radius:var(--r);font-weight:600;font-size:13px;margin-top:8px;}
.type-toggle{display:flex;background:var(--panel);border:1px solid var(--rim);border-radius:var(--r-sm);overflow:hidden;margin-bottom:16px;}
.tt-btn{flex:1;padding:11px;border:none;font-weight:600;font-size:13px;background:transparent;color:var(--dim);transition:all .15s;}
.tt-btn.on{background:var(--gold);color:var(--ink);}
.empty-note{color:var(--muted);font-size:12px;text-align:center;padding:18px 0;font-style:italic;}
.connecting{position:fixed;inset:0;background:var(--ink);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:24px;height:24px;border:2px solid var(--rim);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="connecting" id="connecting">
  <div style="font-size:48px;">🦏</div>
  <div style="font-family:var(--display);font-size:24px;color:var(--gold2);">Rhino Shines</div>
  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--dim);letter-spacing:1px;">Connecting…</div>
</div>

<div class="toast" id="toast"></div>

<div class="lb" id="lb" onclick="if(event.target===this)closeLB()">
  <img id="lb-img" src="" alt="" style="display:none"/>
  <video id="lb-vid" src="" controls playsinline style="display:none"></video>
  <button class="lb-close" onclick="closeLB()">✕ Close</button>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
 <div class="modal-sheet">
  <div class="modal-handle"></div>
  <div id="modal-hdr"></div>
  <div class="modal-sec">📝 Remarks</div>
  <div class="field" style="margin-bottom:18px;"><textarea id="remarks" rows="3" placeholder="Vehicle condition, special requests, collection time…"></textarea></div>
  <div class="modal-sec">Media</div>
  <div style="display:flex;gap:7px;margin-bottom:13px;">
    <button class="tbtn on" id="mt-p" onclick="setMTab('photos')" style="flex:1;padding:9px;font-size:12px;">📷 Photos (<span id="pcount">0</span>)</button>
    <button class="tbtn off" id="mt-v" onclick="setMTab('videos')" style="flex:1;padding:9px;font-size:12px;">🎥 Videos (<span id="vcount">0</span>)</button>
  </div>
  <div id="pane-p">
    <div class="media-grid">
      <label class="media-lbl"><input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="addPhotos(this)"/>
        <div style="font-size:24px;">📸</div><div style="font-size:12px;font-weight:600;">Take Photo</div><div style="font-size:10px;color:var(--dim);">Camera</div></label>
      <label class="media-lbl"><input type="file" accept="image/*" multiple style="display:none" onchange="addPhotos(this)"/>
        <div style="font-size:24px;">🖼️</div><div style="font-size:12px;font-weight:600;">Gallery</div><div style="font-size:10px;color:var(--dim);">Choose file</div></label>
    </div>
    <div class="photo-grid" id="photo-grid"></div>
    <div class="empty-note" id="photo-empty">No photos attached</div>
  </div>
  <div id="pane-v" style="display:none;">
    <div class="media-grid">
      <label class="media-lbl"><input type="file" accept="video/*" capture="environment" style="display:none" onchange="addVideos(this)"/>
        <div style="font-size:24px;">🎬</div><div style="font-size:12px;font-weight:600;">Record</div><div style="font-size:10px;color:var(--dim);">Camera</div></label>
      <label class="media-lbl"><input type="file" accept="video/*" style="display:none" onchange="addVideos(this)"/>
        <div style="font-size:24px;">📂</div><div style="font-size:12px;font-weight:600;">Gallery</div><div style="font-size:10px;color:var(--dim);">Choose file</div></label>
    </div>
    <div id="vid-list"></div>
    <div class="empty-note" id="vid-empty">No videos attached</div>
  </div>
  <div class="divider"></div>
  <div class="modal-sec">🔍 Puspakom Inspection</div>
  <button id="puspa-btn" onclick="togglePuspa()" style="width:100%;padding:12px;border:1px solid var(--rim);border-radius:var(--r-sm);font-weight:600;font-size:13px;color:var(--dim);background:var(--panel);margin-bottom:12px;">Enable Puspakom Inspection</button>
  <div id="puspa-panel" style="display:none;"></div>
  <div class="divider"></div>
  <button class="gold-btn" onclick="saveModal()">Save Changes</button>
  <button class="ghost-btn" onclick="closeModal()">Cancel</button>
 </div>
</div>

<div class="hdr">
  <div class="hdr-logo">🦏</div>
  <div>
    <div class="hdr-brand">Rhino Shines</div>
    <div class="hdr-sub" id="hdr-date"></div>
  </div>
  <div class="tab-row">
    <button class="tbtn on"  id="t-queue" onclick="goTab('queue')">Queue</button>
    <button class="tbtn off" id="t-new"   onclick="goTab('new')">+ Add</button>
    <button class="tbtn off" id="t-stats" onclick="goTab('stats')">Stats</button>
  </div>
</div>
<div class="gold-line"></div>
<div class="sum-bar" id="sum-bar"></div>
<div class="gold-line"></div>
<div class="wrap">
  <div id="v-queue"></div>
  <div id="v-new"   style="display:none;"></div>
  <div id="v-stats" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuE5dfJmZQ2d4NfQ_l4wpJ0riMHe2mCbg",
  authDomain: "rhino-shines.firebaseapp.com",
  databaseURL: "https://rhino-shines-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rhino-shines",
  storageBucket: "rhino-shines.firebasestorage.app",
  messagingSenderId: "991788891022",
  appId: "1:991788891022:web:c9ac4f54bf40dd9f5502df",
  measurementId: "G-M159VZ0JH7"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const bookingsRef = ref(db, "bookings");

const SVCS=[
  {id:1,name:"Basic Wash",    price:15,dur:20,color:"#60A5FA"},
  {id:2,name:"Full Wash",     price:25,dur:35,color:"#C084FC"},
  {id:3,name:"Premium Detail",price:55,dur:60,color:"#C9A84C"},
  {id:4,name:"Interior Clean",price:40,dur:50,color:"#34D399"},
  {id:5,name:"Polish & Wax",  price:70,dur:75,color:"#F87171"},
];
const PUSPA=["Road Tax","Insurance","Brake Condition","Tyre Condition","Windscreen / Wiper","Lights (Head/Tail)","Engine Condition","Body / Structure","Air-cond","Battery"];
const BAYS=4;
const todayStr=new Date().toLocaleDateString("en-MY",{day:"2-digit",month:"short",year:"numeric"});
const timeNow=()=>new Date().toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit"});
document.getElementById("hdr-date").textContent=todayStr;

let Q=[],curTab="queue",curFilter="all",modalId=null;
let mPhotos=[],mVideos=[],mPuspaOn=false,mChecks={},mMTab="photos";
let newBookingIds=new Set(),firstLoad=true,fType="walk-in";

const getSvc=id=>SVCS.find(s=>s.id===id);
const occupied=()=>Q.filter(q=>q.status==="in-progress"&&q.bay).map(q=>q.bay);
const freeBays=()=>Array.from({length:BAYS},(_,i)=>i+1).filter(b=>!occupied().includes(b));

let toastTmr;
window.showToast=function(msg,color="#C9A84C"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=color;t.classList.add("show");
  clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.classList.remove("show"),2400);
}

// ── LIVE LISTENER ─────────────────────────────────────────────────────────────
onValue(bookingsRef,(snapshot)=>{
  const prev=Q.map(q=>q.id);
  Q=[];
  snapshot.forEach(child=>Q.push({id:child.key,...child.val()}));
  if(!firstLoad){
    Q.forEach(q=>{
      if(!prev.includes(q.id)&&q.type==="booking"&&q.status==="waiting"){
        newBookingIds.add(q.id);
        showToast("📅 New booking: "+q.plate+" — "+q.customer,"#C9A84C");
      }
    });
  }
  firstLoad=false;
  document.getElementById("connecting").style.display="none";
  renderAll();
});

window.goTab=function(tab){
  curTab=tab;
  ["queue","new","stats"].forEach(t=>{
    document.getElementById("t-"+t).className="tbtn "+(t===tab?"on":"off");
    document.getElementById("v-"+t).style.display=t===tab?"block":"none";
  });
  renderAll();
}

function renderAll(){renderSum();if(curTab==="queue")renderQueue();if(curTab==="new")renderNew();if(curTab==="stats")renderStats();}

function renderSum(){
  const w=Q.filter(q=>q.status==="waiting").length;
  const p=Q.filter(q=>q.status==="in-progress").length;
  const d=Q.filter(q=>q.status==="done").length;
  const r=Q.filter(q=>q.status==="done").reduce((s,q)=>s+(getSvc(q.service)?.price||0),0);
  document.getElementById("sum-bar").innerHTML=[
    {l:"Waiting",v:w,c:"#FBBF24"},{l:"Active",v:p,c:"#93C5FD"},
    {l:"Completed",v:d,c:"#86EFAC"},{l:"Revenue",v:"RM "+r,c:"#C9A84C"},
  ].map(s=>`<div class="sum-cell"><div class="sum-val" style="color:${s.c}">${s.v}</div><div class="sum-lbl">${s.l}</div></div>`).join("");
}

function renderQueue(){
  let bH="";
  for(let b=1;b<=BAYS;b++){
    const car=Q.find(q=>q.bay===b&&q.status==="in-progress");
    const svc=car?getSvc(car.service):null;
    bH+=`<div class="bay ${car?"active":""}" ${car?`style="border-color:${svc?.color}44;"`:""}>
      <div class="bay-num">Bay ${b}</div>
      ${car?`<div class="bay-plate" style="color:${svc?.color}">${car.plate}</div>
             <div class="bay-svc">${svc?.name}</div>
             <div style="margin-top:5px;font-size:10px;color:var(--gold);font-weight:600;">● Active</div>`
           :`<div class="bay-empty">○</div><div style="font-size:9px;color:var(--muted);margin-top:2px;">Available</div>`}
    </div>`;
  }

  const newOnes=Q.filter(q=>newBookingIds.has(q.id));
  const notifH=newOnes.map(q=>`
    <div class="notif">
      <div style="font-size:24px;">📅</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:13px;color:var(--gold2);">New Booking — ${q.plate}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:2px;">${q.customer} · ${getSvc(q.service)?.name} · ${q.time}${q.date?" · "+q.date:""}</div>
      </div>
      <button class="notif-dismiss" onclick="dismissNotif('${q.id}')">Dismiss</button>
    </div>`).join("");

  const fH=["all","waiting","in-progress","done"].map(f=>
    `<button class="fbtn ${f===curFilter?"on":"off"}" onclick="setFilter('${f}')">
      ${f==="all"?"All":f==="in-progress"?"In Service":f[0].toUpperCase()+f.slice(1)}
    </button>`).join("");

  const list=curFilter==="all"?Q:Q.filter(q=>q.status===curFilter);
  let cH=list.length===0?`<div style="text-align:center;color:var(--muted);padding:48px 0;font-size:13px;font-style:italic;">No entries to display</div>`:"";

  list.forEach(e=>{
    const svc=getSvc(e.service);
    const isNew=newBookingIds.has(e.id);
    const tbdg=e.type==="booking"?`<span class="type-b">Booking</span>`:`<span class="type-w">Walk-in</span>`;
    let sbdg=isNew?`<span class="bdg bdg-new">New ✨</span>`:
      e.status==="waiting"?`<span class="bdg bdg-w">Waiting</span>`:
      e.status==="in-progress"?`<span class="bdg bdg-p">In Service</span>`:`<span class="bdg bdg-d">Complete</span>`;
    let pills="";
    if(e.phone) pills+=`<span class="pill" style="background:#22C55E11;color:#86EFAC;border-color:#22C55E33;">📞 ${e.phone}</span>`;
    if(e.date)  pills+=`<span class="pill" style="background:#3B82F611;color:#93C5FD;border-color:#3B82F633;">📆 ${e.date}</span>`;
    if(e.remarks?.trim()) pills+=`<span class="pill" style="background:#C9A84C11;color:#C9A84C;border-color:#C9A84C33;">📝 Note</span>`;
    const acts=`<button class="abtn detail" onclick="openModal('${e.id}')">View Details</button>
      ${e.status==="waiting"?`<button class="abtn assign" onclick="assignBay('${e.id}')">Assign Bay</button>`:""}
      ${e.status==="in-progress"?`<button class="abtn done" onclick="markDone('${e.id}')">Mark Complete</button>`:""}
      <button class="abtn del" onclick="removeEntry('${e.id}')">✕</button>`;
    cH+=`<div class="qcard ${isNew?"new-booking":""}" style="border-left-color:${svc?.color||"#C9A84C"}">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <div class="plate-tag">${e.plate}</div>
        <div style="flex:1;min-width:0;">
          <div class="card-name">${e.customer} ${tbdg}${e.bay?`<span style="font-size:10px;color:var(--dim);">· Bay ${e.bay}</span>`:""}</div>
          <div class="card-meta">${svc?.name} · RM ${svc?.price} · ${e.time}</div>
          <div class="pills">${pills}</div>
        </div>
        ${sbdg}
      </div>
      <div class="act-row">${acts}</div>
    </div>`;
  });

  document.getElementById("v-queue").innerHTML=`
    <div class="sec-eyebrow"><span class="live-dot"></span>Live Queue</div>
    ${notifH}
    <div class="bay-grid">${bH}</div>
    <div class="filters">${fH}</div>
    ${cH}`;
}

window.setFilter=function(f){curFilter=f;renderQueue();}
window.dismissNotif=function(id){newBookingIds.delete(id);renderQueue();}
window.assignBay=function(id){
  const a=freeBays();if(!a.length)return showToast("No available bays","#EF4444");
  update(ref(db,"bookings/"+id),{bay:a[0],status:"in-progress"});showToast("Bay "+a[0]+" assigned");
}
window.markDone=function(id){update(ref(db,"bookings/"+id),{status:"done",bay:null});showToast("Marked complete ✓");}
window.removeEntry=function(id){remove(ref(db,"bookings/"+id));showToast("Entry removed","#6B7280");}

function renderNew(){
  document.getElementById("v-new").innerHTML=`
    <div style="background:var(--panel);border:1px solid var(--rim);border-radius:var(--r);padding:20px;">
      <div class="sec-eyebrow" style="margin-bottom:16px;">New Entry</div>
      <div class="type-toggle">
        <button id="ft-w" class="tt-btn on" onclick="setFType('walk-in')">🚶 Walk-in</button>
        <button id="ft-b" class="tt-btn off" onclick="setFType('booking')">📅 Booking</button>
      </div>
      <div id="bf" style="display:none;"><div class="field"><label>Customer Name</label><input id="f-cust" placeholder="Full name"/></div></div>
      <div class="field"><label>Vehicle Plate *</label><input id="f-plate" placeholder="e.g. VCX 2211" style="font-family:var(--display);font-size:15px;letter-spacing:2px;" oninput="this.value=this.value.toUpperCase()"/></div>
      <div class="field"><label>Service Package</label>
        <select id="f-svc">${SVCS.map(s=>`<option value="${s.id}">${s.name} — RM ${s.price} (${s.dur} min)</option>`).join("")}</select>
      </div>
      <div id="bx" style="display:none;">
        <div class="field"><label>Appointment Time</label><input type="time" id="f-time"/></div>
        <div class="field"><label>Contact Number</label><input id="f-phone" placeholder="01X-XXXXXXXX"/></div>
      </div>
      <button class="gold-btn" onclick="addEntry()" style="margin-top:4px;">Add to Queue</button>
    </div>`;
  setFType(fType);
}

window.setFType=function(t){
  fType=t;
  const w=document.getElementById("ft-w"),b=document.getElementById("ft-b");if(!w)return;
  w.className="tt-btn "+(t==="walk-in"?"on":"off");
  b.className="tt-btn "+(t==="booking"?"on":"off");
  document.getElementById("bf").style.display=t==="booking"?"block":"none";
  document.getElementById("bx").style.display=t==="booking"?"block":"none";
}
window.addEntry=function(){
  const plate=(document.getElementById("f-plate")?.value||"").trim().toUpperCase();
  const cust=(document.getElementById("f-cust")?.value||"").trim();
  const svc=parseInt(document.getElementById("f-svc")?.value||"1");
  const time=document.getElementById("f-time")?.value||timeNow();
  const phone=document.getElementById("f-phone")?.value||"";
  if(!plate)return showToast("Vehicle plate required","#EF4444");
  if(fType==="booking"&&!cust)return showToast("Customer name required","#EF4444");
  push(bookingsRef,{type:fType,customer:fType==="walk-in"?"Walk-in":cust,plate,service:svc,bay:null,status:"waiting",time,phone,remarks:"",photos:[],videos:[],puspakom:{enabled:false,results:{}},createdAt:Date.now()});
  showToast("Added to queue ✓");goTab("queue");
}

function renderStats(){
  const done=Q.filter(q=>q.status==="done").length;
  const rev=Q.filter(q=>q.status==="done").reduce((s,q)=>s+(getSvc(q.service)?.price||0),0);
  const sH=[
    {l:"Total Vehicles",v:Q.length,c:"#93C5FD"},{l:"Completed",v:done,c:"#86EFAC"},
    {l:"Total Revenue",v:"RM "+rev,c:"#C9A84C"},{l:"Bays Free",v:freeBays().length,c:"#C4B5FD"},
  ].map(s=>`<div class="stat-card" style="border-top:2px solid ${s.c}44;"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("");
  const svcH=SVCS.map(svc=>{
    const cnt=Q.filter(q=>q.service===svc.id).length;
    const rv=Q.filter(q=>q.service===svc.id&&q.status==="done").length*svc.price;
    if(!cnt)return "";
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:11px;">
      <div style="width:3px;height:28px;border-radius:2px;background:${svc.color};flex-shrink:0;opacity:.8;"></div>
      <div style="flex:1;font-size:13px;font-weight:500;">${svc.name}</div>
      <div style="font-size:11px;color:var(--dim);">${cnt} vehicle${cnt>1?"s":""}</div>
      <div style="font-size:13px;font-weight:600;color:${svc.color};min-width:60px;text-align:right;">RM ${rv}</div>
    </div>`;
  }).join("")||`<div class="empty-note">No completed services yet</div>`;
  document.getElementById("v-stats").innerHTML=`
    <div class="sec-eyebrow">Overview</div>
    <div class="stat-grid">${sH}</div>
    <div style="background:var(--panel);border:1px solid var(--rim);border-radius:var(--r);padding:16px;">
      <div class="sec-eyebrow" style="margin-bottom:14px;">Services</div>${svcH}
    </div>`;
}

window.openModal=function(id){
  const e=Q.find(q=>q.id===id);if(!e)return;
  modalId=id;mPhotos=[...(e.photos||[])];mVideos=[...(e.videos||[])];
  mPuspaOn=e.puspakom?.enabled||false;mChecks={...e.puspakom?.results||{}};
  const svc=getSvc(e.service);
  const tbdg=e.type==="booking"?`<span class="type-b">Booking</span>`:`<span class="type-w">Walk-in</span>`;
  document.getElementById("modal-hdr").innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--rim);">
      <div style="background:var(--panel);border:1px solid ${svc?.color}66;border-radius:8px;padding:6px 12px;font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:2px;color:${svc?.color};">${e.plate}</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14px;margin-bottom:3px;">${e.customer} ${tbdg}</div>
        <div style="font-size:11px;color:var(--dim);">${svc?.name} · RM ${svc?.price} · ${e.time}${e.phone?" · 📞 "+e.phone:""}${e.date?" · 📆 "+e.date:""}</div>
        ${e.remarks?`<div style="font-size:11px;color:var(--gold);margin-top:4px;">📝 ${e.remarks}</div>`:""}
      </div>
    </div>`;
  document.getElementById("remarks").value=e.remarks||"";
  mMTab="photos";setMTab("photos");renderPhotos();renderVideos();updatePuspaBtn();renderPuspa();
  document.getElementById("modal").classList.add("open");document.body.style.overflow="hidden";
}
window.closeModal=function(){document.getElementById("modal").classList.remove("open");document.body.style.overflow="";modalId=null;}
window.saveModal=function(){
  if(modalId===null)return;
  update(ref(db,"bookings/"+modalId),{
    remarks:document.getElementById("remarks").value,
    photos:mPhotos,videos:mVideos,
    puspakom:{enabled:mPuspaOn,results:{...mChecks}}
  });
  showToast("Changes saved ✓");closeModal();
}

window.setMTab=function(t){
  mMTab=t;
  document.getElementById("mt-p").className="tbtn "+(t==="photos"?"on":"off");
  document.getElementById("mt-v").className="tbtn "+(t==="videos"?"on":"off");
  document.getElementById("pane-p").style.display=t==="photos"?"block":"none";
  document.getElementById("pane-v").style.display=t==="videos"?"block":"none";
}
window.addPhotos=function(inp){
  const files=Array.from(inp.files||[]);if(!files.length)return;
  let done=0;
  files.forEach(f=>{const r=new FileReader();r.onloadend=()=>{mPhotos.push({src:r.result,name:f.name,time:timeNow()});if(++done===files.length)renderPhotos();};r.readAsDataURL(f);});
  inp.value="";
}
window.delPhoto=function(i){mPhotos.splice(i,1);renderPhotos();}
function renderPhotos(){
  document.getElementById("pcount").textContent=mPhotos.length;
  const g=document.getElementById("photo-grid"),em=document.getElementById("photo-empty");
  if(!mPhotos.length){g.innerHTML="";em.style.display="block";return;}
  em.style.display="none";
  g.innerHTML=mPhotos.map((p,i)=>`<div class="photo-wrap" onclick="openLB('photo','${p.src}')"><img src="${p.src}" alt=""/><div class="photo-overlay"></div><div class="photo-time">${p.time}</div><button class="photo-del" onclick="event.stopPropagation();delPhoto(${i})">✕</button></div>`).join("");
}
window.addVideos=function(inp){Array.from(inp.files||[]).forEach(f=>{mVideos.push({src:URL.createObjectURL(f),name:f.name,time:timeNow()});});inp.value="";renderVideos();}
window.delVideo=function(i){URL.revokeObjectURL(mVideos[i]?.src);mVideos.splice(i,1);renderVideos();}
function renderVideos(){
  document.getElementById("vcount").textContent=mVideos.length;
  const l=document.getElementById("vid-list"),em=document.getElementById("vid-empty");
  if(!mVideos.length){l.innerHTML="";em.style.display="block";return;}
  em.style.display="none";
  l.innerHTML=mVideos.map((v,i)=>`<div class="vid-row" onclick="openLB('video','${v.src}')"><div style="font-size:20px;color:var(--dim);">▶</div><div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${v.name}</div><div style="font-size:10px;color:var(--dim);">${v.time}</div></div><button class="vid-del" onclick="event.stopPropagation();delVideo(${i})">Remove</button></div>`).join("");
}
window.openLB=function(type,src){
  const img=document.getElementById("lb-img"),vid=document.getElementById("lb-vid");
  if(type==="photo"){img.src=src;img.style.display="block";vid.style.display="none";}
  else{vid.src=src;vid.style.display="block";img.style.display="none";}
  document.getElementById("lb").classList.add("open");
}
window.closeLB=function(){document.getElementById("lb-vid").pause();document.getElementById("lb").classList.remove("open");}
window.togglePuspa=function(){mPuspaOn=!mPuspaOn;updatePuspaBtn();renderPuspa();}
function updatePuspaBtn(){
  const btn=document.getElementById("puspa-btn");
  if(mPuspaOn){btn.textContent="✓ Inspection Active — Tap to Disable";btn.style.background="linear-gradient(135deg,#064e3b,#059669)";btn.style.color="#fff";btn.style.borderColor="transparent";}
  else{btn.textContent="Enable Puspakom Inspection";btn.style.background="var(--panel)";btn.style.color="var(--dim)";btn.style.borderColor="var(--rim)";}
}
window.setChk=function(label,val){mChecks[label]=mChecks[label]===val?"pending":val;renderPuspa();}
function renderPuspa(){
  const panel=document.getElementById("puspa-panel");
  if(!mPuspaOn){panel.style.display="none";return;}
  panel.style.display="block";
  const pn=Object.values(mChecks).filter(v=>v==="pass").length;
  const fn=Object.values(mChecks).filter(v=>v==="fail").length;
  panel.innerHTML=`<div class="score-pills">
    <span class="spill" style="background:#22C55E22;color:#86EFAC;border:1px solid #22C55E33;">${pn} Pass</span>
    <span class="spill" style="background:#EF444422;color:#F87171;border:1px solid #EF444433;">${fn} Fail</span>
    <span class="spill" style="background:#F59E0B22;color:#FCD34D;border:1px solid #F59E0B33;">${PUSPA.length-pn-fn} Pending</span>
  </div>
  ${PUSPA.map(label=>{const val=mChecks[label]||"pending";return`<div class="puspa-row"><div class="puspa-lbl">${label}</div>
    <button class="pchk ${val==="pass"?"pass":""}" onclick="setChk('${label}','pass')">✓</button>
    <button class="pchk ${val==="fail"?"fail":""}" onclick="setChk('${label}','fail')">✗</button>
    <button class="pchk ${val==="pending"?"pend":""}" onclick="setChk('${label}','pending')">—</button>
  </div>`;}).join("")}
  <div class="prog-bar"><div style="width:${(pn/PUSPA.length)*100}%;background:#22C55E;"></div><div style="width:${(fn/PUSPA.length)*100}%;background:#EF4444;"></div></div>
  <div style="font-size:10px;color:var(--dim);text-align:right;margin-top:5px;">${Math.round((pn/PUSPA.length)*100)}% PASSED · ${todayStr}</div>`;
}

renderAll();
</script>
</body>
</html>
